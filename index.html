<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A flag and music quiz game">
  <title>Flag & Music Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1 class="site-title">Quombo</h1>

    <!-- ===== MAIN MENU ===== -->
    <section id="mainMenu" class="screen">
      <p class="menu-tagline">Quiz + Combo</p>
      <p class="menu-subtitle">Use this wombo when you are doing two quizes at once</p>
      <nav class="menu-nav">
        <button id="menuPlayBtn" class="menu-btn menu-btn--primary">▶ Play</button>
        <button class="menu-btn menu-btn--disabled" disabled aria-disabled="true">⚙ Settings</button>
        <button id="shareBtn" class="menu-btn">↗ Share</button>
      </nav>
    </section>

    <!-- ===== SETTINGS / LOBBY ===== -->
    <section id="settingsScreen" class="screen" style="display:none;">
      <button id="backBtn" class="menu-btn">← Back</button>
      <h2 class="settings-title">Set Up Your Quiz</h2>

      <div class="settings-grid">

        <div class="settings-block">
          <h3 class="settings-label">Artist</h3>
          <div class="option-group" id="artistGroup">
            <button class="option-card selected" data-value="beatles">🎸 The Beatles</button>
          </div>
        </div>

        <div class="settings-block">
          <h3 class="settings-label">Geography</h3>
          <div class="option-group" id="geoGroup">
            <button class="option-card selected" data-value="flags">🌍 Flags</button>
          </div>
        </div>

        <div class="settings-block">
          <h3 class="settings-label">Length</h3>
          <div class="option-group" id="lengthGroup">
            <button class="option-card selected" data-value="5">Short <span class="option-sub">5 questions</span></button>
            <button class="option-card" data-value="10">Medium <span class="option-sub">10 questions</span></button>
            <button class="option-card" data-value="15">Long <span class="option-sub">15 questions</span></button>
          </div>
        </div>

      </div>

      <button id="confirmBtn" class="confirm-btn">Confirm & Play</button>
    </section>

    <!-- ===== QUIZ ===== -->
    <section id="quizContent" aria-labelledby="question" style="display:none;">
      <h2 id="question">Loading question...</h2>

      <form id="quizForm">
        <div class="quiz-row">
          
          <div class="quiz-column">
            <div class="media-container">
              <img id="flagImg" src="" alt="Guess this flag">
            </div>
            <div class="input-group">
              <label for="answerInput">Which country does this flag belong to?</label>
              <div class="input-wrapper">
                <input
                  type="text"
                  id="answerInput"
                  placeholder="Type to search countries..."
                  autocomplete="off"
                >
                <ul id="suggestions" class="suggestions-dropdown" role="listbox" aria-label="Country suggestions"></ul>
              </div>
            </div>
          </div>

          <div class="quiz-column">
            <div class="media-container">
              <button type="button" id="replayBtn" class="play-sample-btn" aria-label="Play 1 second audio track">🎵 Play 1s Sample</button>
            </div>
            <div class="input-group">
              <label for="songInput">What Beatles song is playing?</label>
              <div class="input-wrapper">
                <input
                  type="text"
                  id="songInput"
                  placeholder="Type to search songs..."
                  autocomplete="off"
                >
                <ul id="songSuggestions" class="suggestions-dropdown" role="listbox" aria-label="Song suggestions"></ul>
              </div>
            </div>
          </div>

        </div>

        <div class="controls">
          <button type="button" id="submitBtn" aria-label="Submit your answers">Submit</button>
          <button type="button" id="nextBtn" style="display: none;" aria-label="Move to next question">Next</button>
        </div>
      </form>

      <div id="feedback" aria-live="polite" aria-atomic="true"></div>
      <div id="error" role="alert" style="display: none;"></div>

      <button type="button" id="tryAgainBtn" style="display: none;" aria-label="Restart the quiz">Try Again</button>
    </section>

    <div id="score" aria-live="polite"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
