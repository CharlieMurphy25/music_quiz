<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A flag quiz game where you guess the country from its flag">
  <title>Flag Quiz Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Flag Quiz</h1>
    <section id="quizContent" aria-labelledby="question">
      <h2 id="question">Loading question...</h2>

      <img id="flagImg" src="" alt="Guess this flag" width="320">

      <form id="quizForm">
        <label for="answerInput">Which country does this flag belong to?</label>
        <div class="input-wrapper">
          <input
            type="text"
            id="answerInput"
            placeholder="Type to search..."
            autocomplete="off"
            aria-describedby="answerHint"
            aria-autocomplete="list"
            aria-controls="suggestions"
          >
          <ul id="suggestions" role="listbox" aria-label="Country suggestions"></ul>
        </div>
        <small id="answerHint" class="hint">Start typing to filter countries</small>
        <div class="controls">
          <button type="button" id="submitBtn" aria-label="Submit your answer">Submit</button>
          <button type="button" id="nextBtn" style="display: none;" aria-label="Move to next question">Next</button>
        </div>
      </form>

      <div id="feedback" aria-live="polite" aria-atomic="true"></div>
      <div id="error" role="alert" style="display: none;"></div>

      <button type="button" id="tryAgainBtn" style="display: none;" aria-label="Restart the quiz">Try Again</button>
    </section>

    <div id="score" aria-live="polite"></div>
  </main>
  <script src="script.js"></script>
</body>
</html>
