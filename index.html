<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <h1>Quiz Game</h1>

    <h2 id="question">Loading question...</h2>

    <label for="answerInput" class="sr-only">Choose your answer:</label>
    <input type="text" id="answerInput" list="answerOptions" placeholder="Type to search...">
    <datalist id="answerOptions"></datalist>

    <div class="controls">
      <button id="submitBtn">Submit</button>
      <button id="nextBtn" style="display: none;">Next</button>
    </div>

    <div id="score" aria-live="polite"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
